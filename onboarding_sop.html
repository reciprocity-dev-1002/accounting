<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Client Onboarding SOP — Reciprocity Accounting</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512px.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f3ee;
    color: #1a1a18;
    padding: 32px;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
    background: #faf9f6;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    padding: 40px;
  }

  .page-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-align: center;
    text-transform: uppercase;
    color: #1a1a18;
    margin-bottom: 6px;
  }

  .page-subtitle {
    font-size: 12px;
    text-align: center;
    color: #888780;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .divider {
    height: 0.5px;
    background: #c8a96e;
    margin-bottom: 24px;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }

  .progress-bar {
    flex: 1;
    height: 2px;
    background: #d3d1c7;
    border-radius: 1px;
  }

  .progress-fill {
    height: 100%;
    background: #c8a96e;
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888780;
    white-space: nowrap;
  }

  /* Nav */
  .nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .nav-btn {
    padding: 5px 13px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border: 0.5px solid #c8c6bc;
    background: #f1efe8;
    color: #888780;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .nav-btn:hover {
    border-color: #1a1a18;
    color: #1a1a18;
  }

  .nav-btn.active {
    border-color: #1a1a18;
    background: #1a1a18;
    color: #faf9f6;
  }

  .nav-btn.complete {
    border-color: #c8a96e;
    background: #fdf6e8;
    color: #c8a96e;
  }

  /* Card */
  .card {
    background: #faf9f6;
    border: 0.5px solid #c8c6bc;
    border-radius: 6px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 0.5px solid #d3d1c7;
    background: #f1efe8;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a18;
    letter-spacing: 0.02em;
  }

  .card-desc {
    font-size: 11px;
    color: #888780;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  /* Steps */
  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 11px 20px;
    cursor: pointer;
    border-bottom: 0.5px solid #ece9e1;
    transition: background 0.1s;
  }

  .step:hover { background: #f5f3ee; }
  .step.done  { background: #f8f7f3; }
  .step:last-child { border-bottom: none; }

  .checkbox {
    width: 16px;
    height: 16px;
    border: 1px solid #c8c6bc;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .checkbox.checked {
    border-color: #c8a96e;
    background: #c8a96e;
  }

  .step-text {
    font-size: 13px;
    color: #2c2c2a;
    line-height: 1.5;
    transition: all 0.15s;
    font-weight: 400;
  }

  .step-text.section-header {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888780;
    cursor: default;
    padding-top: 2px;
  }

  .step-text.done {
    color: #b0aca4;
    text-decoration: line-through;
  }

  /* Footer */
  .footer {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 0.5px solid #d3d1c7;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-left {
    font-size: 10px;
    color: #888780;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .footer-right {
    font-size: 10px;
    color: #1a1a18;
    letter-spacing: 0.04em;
    font-style: italic;
  }

  .footer-right .gold { color: #c8a96e; }

  @media (max-width: 600px) {
    body { padding: 16px; }
    .page { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div style="max-width:780px;margin:0 auto;padding:24px 0 0;">
  <a href="index.html" style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#888780;text-decoration:none;">&larr; Back to Hub</a>
</div>

<div class="page">

  <div class="page-title">Client Onboarding SOP</div>
  <div class="page-subtitle">Reciprocity Accounting LLC &nbsp;&middot;&nbsp; Interactive Checklist &nbsp;&middot;&nbsp; V1 2026</div>
  <div class="divider"></div>

  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 0 complete</div>
  </div>

  <div class="nav" id="nav"></div>
  <div class="card" id="card"></div>

  <div class="footer">
    <div class="footer-left">Reciprocity Accounting LLC &nbsp;&middot;&nbsp; Internal Use Only</div>
    <div class="footer-right">Books closed by the 10th. Every month. <span class="gold">Guaranteed.</span></div>
  </div>

</div>

<script>
const sections = [
  { id:"pre", title:"Pre-Onboarding", desc:"Before the client signs anything.", steps:[
    "Identify decision maker (owner name, title)",
    "Identify office manager name + email",
    "Identify practice management software (Dentrix, Eaglesoft, other)",
    "Identify accounting software (QBO)",
    "Engagement agreement sent via Ignition",
    "Ignition agreement signed by client",
    "ACH / payment authorization confirmed",
    "Onboarding questionnaire sent via Double"
  ]},
  { id:"folder", title:"Folder Setup", desc:"Build the client folder structure in OneDrive.", steps:[
    "Create client root folder: [Practice Name]",
    "Create 01 – Agreements",
    "Create 02 – Debt & Liabilities",
    "Create 03 – Banking (subfolders: by year → month)",
    "Create 04 – Payroll",
    "Create 05 – Tax",
    "Create 06 – Practice Operations (subfolders: Production Data, Vendor Invoices)",
    "Create 07 – Financials (subfolders by year → month)",
    "Create 99 – Archive"
  ]},
  { id:"docs", title:"Document Collection", desc:"Get what the bookkeepers need to start.", steps:[
    "Copy signed Ignition agreement → 01 – Agreements",
    "Collect W-9 → 01 – Agreements",
    "Collect entity formation / ownership docs → 01 – Agreements",
    "Collect loan agreements → 02 – Debt & Liabilities",
    "Collect amortization schedules → 02 – Debt & Liabilities",
    "Collect equipment financing docs → 02 – Debt & Liabilities",
    "Collect ACH authorization / voided check → 03 – Banking",
    "Confirm bank read-only access granted → note in 03 – Banking",
    "Collect monthly bank statements → 03 – Banking / [year] / [month]",
    "Collect monthly credit card statements → 03 – Banking / [year] / [month]",
    "Collect merchant processor statements (Apex/Cardpoint) → 03 – Banking / [year] / [month]",
    "Generate Vendor Invoices upload link (OneDrive → People you choose → Can edit)",
    "Send Vendor Invoices upload link to office manager",
    "Collect payroll setup docs (Gusto/ADP) → 04 – Payroll",
    "Collect payroll summary reports → 04 – Payroll",
    "Collect 941 / 940 filings → 04 – Payroll",
    "Collect workers comp documentation → 04 – Payroll",
    "Collect provider compensation models → 04 – Payroll",
    "Collect prior year tax return → 05 – Tax",
    "Collect depreciation / fixed asset schedules → 05 – Tax",
    "Collect production reports (Dentrix/Eaglesoft) → 06 – Practice Operations / Production Data",
    "Collect insurance AR aging → 06 – Practice Operations / Production Data",
    "Collect collections data → 06 – Practice Operations / Production Data",
    "Confirm client request list sent and all items received (see Client Request List section)"
  ]},
  { id:"client", title:"Client Request List", desc:"Send this to the client at onboarding. Track responses here.", steps:[
    "— BUSINESS STRUCTURE —",
    "Legal entity name (exact as registered)",
    "Entity type (LLC, S-Corp, etc.)",
    "Ownership % breakdown",
    "EIN",
    "State(s) of operation",
    "Fiscal year end",
    "Practice acquisition date",
    "Related entities (real estate LLC, management company, etc.)",
    "CPA firm name + contact (for year-end coordination)",
    "— ACCOUNTING SYSTEM —",
    "Accounting software (QBO)",
    "Accounting method: cash or accrual",
    "Read-only access to accounting software",
    "Chart of Accounts export",
    "Trial Balance (current year)",
    "AR Aging report",
    "AP Aging report",
    "Last 12 months P&L and Balance Sheet",
    "— BANKING & CREDIT CARDS —",
    "View-only access to all operating bank accounts",
    "View-only access to all business credit cards",
    "View-only access to line of credit (if applicable)",
    "List of all bank accounts (name + last 4)",
    "List of all credit cards (issuer + last 4)",
    "Merchant processors used (CareCredit, Stripe, Apex, Cardpoint, etc.)",
    "Where merchant deposits land",
    "Last 3 months bank statements (if portal access not available)",
    "Last 3 months credit card statements (if portal access not available)",
    "— PRACTICE MANAGEMENT & REVENUE —",
    "Practice management software (Open Dental, Dentrix, Eaglesoft, etc.)",
    "Read-only access to practice management software",
    "Monthly production report (last 12 months)",
    "Monthly collections report (last 12 months)",
    "Provider production breakdown",
    "Adjustments report (last 3 months)",
    "Current fee schedule export",
    "Insurance write-off methodology",
    "— PAYROLL & COMPENSATION —",
    "Payroll provider + view-only access",
    "Payroll register (last 3 months)",
    "Employer tax summary (last 3 months)",
    "Associate compensation structure (% of production or collections)",
    "Lab fee treatment (deducted before comp?)",
    "Owner compensation method (W-2, draws, mix)",
    "Health insurance treatment",
    "Retirement plan type (if any)",
    "— FIXED OBLIGATIONS —",
    "Lease agreement (or monthly rent + escalation terms)",
    "All equipment loans",
    "Practice acquisition loan",
    "Amortization schedules (if available)",
    "Major recurring software subscriptions (Weave, Solutionreach, etc.)",
    "Primary supply vendors (top 5)",
    "Lab vendors used"
  ]},
  { id:"qbo", title:"QBO Setup", desc:"Get the books ready for the bookkeepers.", steps:[
    "Connect client QBO to QBOA firm account",
    "Export Chart of Accounts (CSV) → 07 – Financials",
    "Export Trial Balance (current year) → 07 – Financials",
    "Review COA against Reciprocity standard dental COA",
    "Adjust COA as needed — document open items",
    "Confirm bank feed connected in QBO",
    "Confirm all bank credentials documented in 1Password"
  ]},
  { id:"ig", title:"IG Handoff", desc:"Brief the bookkeepers and confirm they have everything.", steps:[
    "Post client intro in Teams – Active Clients channel",
    "Confirm bookkeeper assignment",
    "Confirm bookkeepers have QBO access",
    "Confirm bookkeepers have bank statement access (03 – Banking)",
    "Confirm bookkeepers have production data (06 – Practice Operations)",
    "Post COA reference doc to Teams",
    "Note any open items (insurance write-off method, financing fee rates, etc.)",
    "Set first close target date (10th of following month)"
  ]},
  { id:"close", title:"First Close", desc:"Confirm the first month close is ready to deliver.", steps:[
    "P&L reviewed and approved",
    "Balance Sheet reviewed and approved",
    "Cash Flow reviewed and approved",
    "General ledger export saved → 07 – Financials / [year] / [month]",
    "Reconciliation report saved → 07 – Financials / [year] / [month]",
    "KPI dashboard prepared",
    "Commentary memo written",
    "Financials delivered to client via Double / email by the 10th"
  ]}
];

const checked = {};
sections.forEach(s => s.steps.forEach((_, i) => { checked[s.id+'-'+i] = false; }));

let activeId = "pre";

function totalSteps() {
  return sections.reduce((a,s) => a + s.steps.filter(t => !t.startsWith('—')).length, 0);
}
function totalDone() { return Object.values(checked).filter(Boolean).length; }

function updateProgress() {
  const pct = Math.round((totalDone()/totalSteps())*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-label').textContent = totalDone()+' / '+totalSteps()+' complete';
}

function sectionDone(s) {
  return s.steps.every((t,i) => t.startsWith('—') || checked[s.id+'-'+i]);
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  sections.forEach(s => {
    const btn = document.createElement('button');
    const done = sectionDone(s);
    btn.className = 'nav-btn' + (s.id===activeId?' active':'') + (done?' complete':'');
    btn.textContent = (done ? '✓ ' : '') + s.title;
    btn.onclick = () => { activeId = s.id; render(); };
    nav.appendChild(btn);
  });
}

function renderCard() {
  const s = sections.find(x => x.id===activeId);
  const card = document.getElementById('card');
  let html = `<div class="card-header"><div class="card-title">${s.title}</div><div class="card-desc">${s.desc}</div></div>`;
  s.steps.forEach((text, i) => {
    const key = s.id+'-'+i;
    const isHeader = text.startsWith('—');
    const done = !isHeader && checked[key];
    if (isHeader) {
      html += `<div class="step" style="cursor:default;padding-top:14px;padding-bottom:6px;">
        <div style="width:16px;flex-shrink:0;"></div>
        <div class="step-text section-header">${text.replace(/—/g,'').trim()}</div>
      </div>`;
    } else {
      html += `<div class="step${done?' done':''}" onclick="toggle('${key}')">
        <div class="checkbox${done?' checked':''}">${done?'<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
        <div class="step-text${done?' done':''}">${text}</div>
      </div>`;
    }
  });
  card.innerHTML = html;
}

function render() { renderNav(); renderCard(); updateProgress(); }

window.toggle = function(key) {
  checked[key] = !checked[key];
  render();
};

render();
</script>
</body>
</html>
